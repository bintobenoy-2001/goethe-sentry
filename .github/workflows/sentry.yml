name: goethe-sentry

on:
  workflow_dispatch:
    inputs:
      center_scope:
        description: Which discovered India centers to monitor in this run
        required: false
        default: all
        type: choice
        options:
          - all
          - pinned
          - selected
      selected_centers:
        description: Comma-separated center list when center_scope=selected, e.g. Kolhapur or Kochi,Trivandrum
        required: false
        default: ""
        type: string
      debug_logging:
        description: Enable debug logging for this run
        required: false
        default: false
        type: boolean
      dry_run:
        description: Run checks without sending Telegram messages
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: read

jobs:
  check-once:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      SENTRY_CENTER_SCOPE: ${{ inputs.center_scope || 'all' }}
      SENTRY_SELECTED_CENTERS: ${{ inputs.selected_centers || '' }}
      SENTRY_LOG_LEVEL: ${{ inputs.debug_logging && 'DEBUG' || 'INFO' }}
      SENTRY_DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Restore state cache
        id: restore-state
        uses: actions/cache/restore@v5
        with:
          path: logs/state.json
          key: state-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            state-${{ github.ref_name }}-
            state-

      - name: Restore Playwright cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-1.44.0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Chromium
        run: python -m playwright install chromium

      - name: Ensure logs directory
        run: mkdir -p logs/screenshots logs/diagnostics

      - name: Run one check
        run: python check_once.py

      - name: Save updated state cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: logs/state.json
          key: state-${{ github.ref_name }}-${{ github.run_id }}

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: goethe-sentry-logs
          path: |
            logs/diagnostics/**
            logs/sentry.log
            logs/state.json
