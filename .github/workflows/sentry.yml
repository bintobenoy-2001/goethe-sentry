name: goethe-sentry

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: read

jobs:
  check-once:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore state cache
        id: restore-state
        uses: actions/cache/restore@v4
        with:
          path: logs/state.json
          key: state-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            state-${{ github.ref_name }}-
            state-

      - name: Restore Playwright cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-1.44.0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Chromium
        run: python -m playwright install chromium

      - name: Ensure logs directory
        run: mkdir -p logs/screenshots

      - name: Run one check
        run: python check_once.py

      - name: Save updated state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: logs/state.json
          key: state-${{ github.ref_name }}-${{ github.run_id }}

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: goethe-sentry-logs
          path: |
            logs/sentry.log
            logs/state.json
